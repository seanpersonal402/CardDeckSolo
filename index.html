<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck & Tarot Picker</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-chip { transition: all 0.2s ease; cursor: pointer; border: 1px solid #444; }
        .card-chip:hover { transform: translateY(-2px); border-color: #666; }
        .card-chip.selected { background-color: #3b82f6; border-color: #60a5fa; color: white; }
        .card-chip.disabled { opacity: 0.3; cursor: not-allowed; grayscale: 1; }

        .pile-card { position: absolute; width: 120px; height: 180px; border-radius: 8px; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); background: #2d2d2d; transition: transform 0.3s ease; }
        .card-img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; }

        .deck-option { cursor: pointer; transition: transform 0.3s ease, border-color 0.3s ease; border: 4px solid transparent; }
        .deck-option:hover { transform: scale(1.05); border-color: #3b82f6; }

        .reversed { transform: rotate(180deg); }

        /* Modal Scroll */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #2d2d2d; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="artifact_react"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Constants
        const STANDARD_SUITS = ['Spades', 'Hearts', 'Diamonds', 'Clubs'];
        const STANDARD_RANKS = ['Ace', '2', '3', '4', '5', '6', '7', '8', '9', '10', 'Jack', 'Queen', 'King'];

        const TAROT_SUITS = ['Wands', 'Cups', 'Swords', 'Pentacles'];
        const TAROT_RANKS = ['Ace', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Page', 'Knight', 'Queen', 'King'];
        const MAJOR_ARCANA = [
            "The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor", 
            "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit", 
            "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance", 
            "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"
        ];

        const App = () => {
            const [view, setView] = useState('DECK_SELECT'); // DECK_SELECT, SETUP, ASSIGN, PLAY, REVEAL
            const [deckType, setDeckType] = useState(null); // 'STANDARD' or 'TAROT'
            const [numPiles, setNumPiles] = useState(1);
            const [piles, setPiles] = useState([]);
            const [activePileIdx, setActivePileIdx] = useState(0);
            const [isEditingName, setIsEditingName] = useState(false);
            const [allowReversals, setAllowReversals] = useState(false);

            // Modal for Draw Set
            const [showDrawModal, setShowDrawModal] = useState(false);
            const [drawCount, setDrawCount] = useState(3);

            // Reveal State
            const [revealSet, setRevealSet] = useState([]);
            const [revealIdx, setRevealIdx] = useState(-1);

            // Generate initial deck based on type
            const getAllCards = (type) => {
                if (type === 'STANDARD') {
                    const deck = [];
                    STANDARD_SUITS.forEach(s => STANDARD_RANKS.forEach(r => deck.push({ id: `${r} of ${s}`, rank: r, suit: s, type: 'standard' })));
                    deck.push({ id: 'Joker 1', rank: 'Joker', suit: 'None', type: 'joker' });
                    deck.push({ id: 'Joker 2', rank: 'Joker', suit: 'None', type: 'joker' });
                    return deck;
                } else {
                    const deck = [];
                    // Major Arcana
                    MAJOR_ARCANA.forEach(m => deck.push({ id: m, rank: m, suit: 'Major', type: 'tarot-major' }));
                    // Minor Arcana
                    TAROT_SUITS.forEach(s => TAROT_RANKS.forEach(r => deck.push({ id: `${r} of ${s}`, rank: r, suit: s, type: 'tarot-minor' })));
                    return deck;
                }
            };

            const [fullDeck, setFullDeck] = useState([]);

            // Helper: Get Image URL
            const getCardImage = (card, isReversed) => {
                if (deckType === 'STANDARD') {
                    if (card.rank === 'Joker') return "https://deckofcardsapi.com/static/img/X1.png";
                    const suitMap = { Spades: 'S', Hearts: 'H', Diamonds: 'D', Clubs: 'C' };
                    const rankMap = { Ace: 'A', '10': '0', Jack: 'J', Queen: 'Q', King: 'K' };
                    const code = (rankMap[card.rank] || card.rank) + suitMap[card.suit];
                    return `https://deckofcardsapi.com/static/img/${code}.png`;
                } else {
                    const prefix = "MW_";
                    const ext = ".jpg";
                    if (card.type === 'tarot-major') {
                        const name = card.rank.replace(/ /g, '_');
                        return `assets/MAJOR ARCANA/${prefix}${name}${ext}`;
                    } else {
                        const rank = card.rank;
                        const suit = card.suit;
                        return `assets/MINOR ARCANA/${prefix}${rank}_of_${suit}${ext}`;
                    }
                }
            };

            const toggleCardInPile = (cardId) => {
                const newPiles = [...piles];
                const currentPile = newPiles[activePileIdx];

                if (currentPile.cards.includes(cardId)) {
                    currentPile.cards = currentPile.cards.filter(id => id !== cardId);
                } else {
                    // Remove from other piles first
                    newPiles.forEach(p => p.cards = p.cards.filter(id => id !== cardId));
                    currentPile.cards.push(cardId);
                }
                setPiles(newPiles);
            };

            const handleDeckSelect = (type) => {
                setDeckType(type);
                setFullDeck(getAllCards(type));
                setView('SETUP');
            };

            const startApp = () => {
                const initialPiles = Array.from({ length: numPiles }, (_, i) => ({
                    id: i,
                    name: `Pile ${i + 1}`,
                    cards: [],
                    currentStack: [],
                    drawn: null
                }));
                setPiles(initialPiles);
                setView('ASSIGN');
            };

            const finalizeAssignments = () => {
                const newPiles = piles.map(p => {
                    const shuffled = [...p.cards].sort(() => Math.random() - 0.5);
                    return { ...p, currentStack: shuffled, drawn: null };
                });
                setPiles(newPiles);
                setView('PLAY');
            };

            const drawOne = (pileIdx) => {
                const newPiles = [...piles];
                const pile = newPiles[pileIdx];
                if (pile.currentStack.length === 0) return;

                const cardId = pile.currentStack.pop();
                const cardData = fullDeck.find(d => d.id === cardId);
                const reversed = allowReversals && Math.random() > 0.5;

                pile.drawn = { ...cardData, isReversed: reversed };
                setPiles(newPiles);
            };

            const shufflePile = (pileIdx) => {
                const newPiles = [...piles];
                newPiles[pileIdx].currentStack = [...newPiles[pileIdx].cards].sort(() => Math.random() - 0.5);
                newPiles[pileIdx].drawn = null;
                setPiles(newPiles);
            };

            const triggerDrawSet = (pileIdx) => {
                setActivePileIdx(pileIdx);
                const max = piles[pileIdx].currentStack.length;
                setDrawCount(Math.min(3, max));
                setShowDrawModal(true);
            };

            const startReveal = () => {
                const newPiles = [...piles];
                const pile = newPiles[activePileIdx];
                const set = [];
                for(let i=0; i<drawCount; i++) {
                    const id = pile.currentStack.pop();
                    const data = fullDeck.find(d => d.id === id);
                    const reversed = allowReversals && Math.random() > 0.5;
                    set.push({ ...data, isReversed: reversed });
                }
                // Secretly shuffle the set
                set.sort(() => Math.random() - 0.5);

                setRevealSet(set);
                setRevealIdx(-1);
                setShowDrawModal(false);
                setView('REVEAL');
                setPiles(newPiles);
            };

            // Quick Assignment Helpers
            const addSuit = (suit) => {
                const cards = fullDeck.filter(c => c.suit === suit).map(c => c.id);
                const newPiles = [...piles];
                newPiles.forEach(p => p.cards = p.cards.filter(id => !cards.includes(id)));
                newPiles[activePileIdx].cards = [...new Set([...newPiles[activePileIdx].cards, ...cards])];
                setPiles(newPiles);
            };

            const addMajorArcana = () => {
                const cards = fullDeck.filter(c => c.type === 'tarot-major').map(c => c.id);
                const newPiles = [...piles];
                newPiles.forEach(p => p.cards = p.cards.filter(id => !cards.includes(id)));
                newPiles[activePileIdx].cards = [...new Set([...newPiles[activePileIdx].cards, ...cards])];
                setPiles(newPiles);
            };

            // Render Logic
            if (view === 'DECK_SELECT') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8">
                        <h1 className="text-4xl font-bold mb-12 text-blue-400">Select Your Deck</h1>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 w-full max-w-4xl">
                            <div className="deck-option bg-gray-800 rounded-xl overflow-hidden shadow-2xl" onClick={() => handleDeckSelect('STANDARD')}>
                                <img src="assets/standard_deck.jpg" alt="Standard Deck" className="w-full h-64 object-cover" onError={(e) => e.target.src="https://placehold.co/600x400?text=Standard+Deck"} />
                                <div className="p-6 text-center">
                                    <h2 className="text-2xl font-bold">Standard Playing Cards</h2>
                                    <p className="text-gray-400 mt-2">52 Cards + 2 Jokers</p>
                                </div>
                            </div>
                            <div className="deck-option bg-gray-800 rounded-xl overflow-hidden shadow-2xl" onClick={() => handleDeckSelect('TAROT')}>
                                <img src="assets/tarot_deck.jpg" alt="Tarot Deck" className="w-full h-64 object-cover" onError={(e) => e.target.src="https://placehold.co/600x400?text=Tarot+Deck"} />
                                <div className="p-6 text-center">
                                    <h2 className="text-2xl font-bold">Tarot Deck</h2>
                                    <p className="text-gray-400 mt-2">78 Cards (Major & Minor Arcana)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'SETUP') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="bg-gray-800 p-8 rounded-2xl shadow-xl text-center w-96 border border-gray-700">
                            <h2 className="text-2xl font-bold mb-6">How many piles?</h2>
                            <div className="flex justify-center gap-4 mb-8">
                                {[1,2,3,4,5,6].map(n => (
                                    <button key={n} onClick={() => setNumPiles(n)} 
                                        className={`w-10 h-10 rounded-full font-bold transition ${numPiles === n ? 'bg-blue-500 scale-110 shadow-lg' : 'bg-gray-700 hover:bg-gray-600'}`}>
                                        {n}
                                    </button>
                                ))}
                            </div>
                            <button onClick={startApp} className="w-full py-3 bg-green-600 hover:bg-green-500 rounded-lg font-bold text-lg transition">Continue</button>
                        </div>
                    </div>
                );
            }

            if (view === 'ASSIGN') {
                const assignedGlobal = piles.flatMap(p => p.cards);
                const availableCount = fullDeck.length - assignedGlobal.length;

                return (
                    <div className="p-6 max-w-6xl mx-auto h-screen flex flex-col">
                        <header className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-blue-400">Assign Cards: {piles[activePileIdx].name}</h1>
                                <p className="text-sm text-gray-400">{availableCount} cards remaining in deck</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => setView('DECK_SELECT')} className="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600">Back</button>
                                <button onClick={finalizeAssignments} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded font-bold">Save & Play</button>
                            </div>
                        </header>

                        {/* Pile Tabs */}
                        <div className="flex gap-2 mb-4">
                            {piles.map((p, idx) => (
                                <button key={idx} onClick={() => setActivePileIdx(idx)}
                                    className={`px-4 py-2 rounded-t-lg border-b-2 transition ${activePileIdx === idx ? 'bg-gray-800 border-blue-500 text-blue-400 font-bold' : 'bg-gray-900 border-transparent text-gray-500'}`}>
                                    {p.name} ({p.cards.length})
                                </button>
                            ))}
                        </div>

                        {/* Control Panel */}
                        <div className="flex flex-1 gap-6 overflow-hidden">
                            <div className="w-64 bg-gray-800 rounded-xl p-4 flex flex-col gap-4">
                                <h3 className="font-bold border-b border-gray-700 pb-2">Quick Add</h3>
                                {deckType === 'STANDARD' ? (
                                    STANDARD_SUITS.map(s => (
                                        <button key={s} onClick={() => addSuit(s)} className="text-left px-3 py-2 bg-gray-700 rounded hover:bg-gray-600 text-sm">All {s}</button>
                                    ))
                                ) : (
                                    <>
                                        <button onClick={addMajorArcana} className="text-left px-3 py-2 bg-purple-900 hover:bg-purple-800 rounded text-sm font-bold">All Major Arcana</button>
                                        {TAROT_SUITS.map(s => (
                                            <button key={s} onClick={() => addSuit(s)} className="text-left px-3 py-2 bg-gray-700 rounded hover:bg-gray-600 text-sm">All {s}</button>
                                        ))}
                                    </>
                                )}
                                <div className="mt-auto">
                                    <button onClick={() => setPiles(piles.map(p => ({...p, cards: []})))} className="w-full py-2 bg-red-900/50 text-red-200 rounded text-sm hover:bg-red-800">Clear All Piles</button>
                                </div>
                            </div>

                            <div className="flex-1 bg-gray-800 rounded-xl p-4 overflow-y-auto custom-scroll">
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-2">
                                    {fullDeck.map(card => {
                                        const assignedToIdx = piles.findIndex(p => p.cards.includes(card.id));
                                        const isAssignedToOther = assignedToIdx !== -1 && assignedToIdx !== activePileIdx;
                                        const isAssignedHere = assignedToIdx === activePileIdx;

                                        return (
                                            <div key={card.id} onClick={() => !isAssignedToOther && toggleCardInPile(card.id)}
                                                className={`card-chip p-2 rounded text-xs flex justify-between items-center ${isAssignedHere ? 'selected' : isAssignedToOther ? 'disabled' : 'bg-gray-700'}`}>
                                                <span className="truncate">{card.id}</span>
                                                {isAssignedToOther && <span className="text-[10px] bg-black/40 px-1 rounded">P{assignedToIdx+1}</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'PLAY') {
                return (
                    <div className="p-8 h-screen flex flex-col">
                        <header className="flex justify-between items-center mb-10">
                            <h1 className="text-3xl font-bold flex items-center gap-4">
                                {isEditingName ? (
                                    <input autoFocus value={piles[activePileIdx].name} 
                                        onChange={e => {
                                            const np = [...piles]; np[activePileIdx].name = e.target.value; setPiles(np);
                                        }}
                                        onBlur={() => setIsEditingName(false)}
                                        onKeyDown={e => e.key === 'Enter' && setIsEditingName(false)}
                                        className="bg-gray-800 border-b-2 border-blue-500 outline-none px-2" />
                                ) : (
                                    <span onClick={() => setIsEditingName(true)} className="cursor-pointer hover:text-blue-400">
                                        {piles[activePileIdx].name} <i className="fa-solid fa-pen text-sm opacity-30"></i>
                                    </span>
                                )}
                            </h1>
                            <div className="flex gap-4 items-center">
                                <label className="flex items-center gap-2 text-sm bg-gray-800 px-3 py-2 rounded-lg cursor-pointer">
                                    <input type="checkbox" checked={allowReversals} onChange={e => setAllowReversals(e.target.checked)} />
                                    Allow Reversals
                                </label>
                                <button onClick={() => setView('ASSIGN')} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded">Edit Piles</button>
                            </div>
                        </header>

                        <div className="flex-1 flex gap-8 overflow-x-auto pb-4 custom-scroll">
                            {piles.map((pile, idx) => (
                                <div key={idx} className={`min-w-[300px] flex flex-col items-center p-6 rounded-2xl border-2 transition-all ${activePileIdx === idx ? 'bg-gray-800/50 border-blue-500/50' : 'bg-gray-900 border-gray-800'}`} onClick={() => setActivePileIdx(idx)}>
                                    <h3 className="font-bold mb-4 text-center">{pile.name}</h3>

                                    {/* Pile Visual */}
                                    <div className="relative w-36 h-56 mb-6 flex items-center justify-center">
                                        {pile.currentStack.length > 0 ? (
                                            <>
                                                <div className="absolute w-32 h-44 bg-blue-900 rounded-lg border-2 border-white translate-x-1 translate-y-1"></div>
                                                <div className="absolute w-32 h-44 bg-blue-800 rounded-lg border-2 border-white">
                                                    <div className="w-full h-full flex flex-col items-center justify-center opacity-30">
                                                        <i className="fa-solid fa-layer-group text-3xl"></i>
                                                        <div className="text-xl font-bold mt-2">{pile.currentStack.length}</div>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="w-32 h-44 rounded-lg border-2 border-dashed border-gray-600 flex items-center justify-center text-gray-600">Empty</div>
                                        )}
                                    </div>

                                    {/* Draw Controls */}
                                    <div className="flex flex-col gap-2 w-full mt-auto">
                                        {pile.currentStack.length > 0 ? (
                                            <>
                                                <button onClick={(e) => { e.stopPropagation(); drawOne(idx); }} className="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold">Draw One</button>
                                                <button onClick={(e) => { e.stopPropagation(); triggerDrawSet(idx); }} className="w-full py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm">Draw a Set...</button>
                                            </>
                                        ) : (
                                            <button onClick={(e) => { e.stopPropagation(); shufflePile(idx); }} className="w-full py-3 bg-green-700 hover:bg-green-600 rounded-lg font-bold"><i className="fa-solid fa-rotate-right mr-2"></i>Reshuffle</button>
                                        )}
                                    </div>

                                    {/* Last Drawn Preview */}
                                    {pile.drawn && (
                                        <div className="mt-6 text-center animate-fade-in">
                                            <p className="text-xs text-gray-500 mb-1">Drawn:</p>
                                            <div className="w-24 h-36 bg-white rounded-lg shadow-xl mx-auto overflow-hidden border-2 border-blue-400">
                                                <img src={getCardImage(pile.drawn)} alt="Drawn" className={`w-full h-full object-cover ${pile.drawn.isReversed ? 'reversed' : ''}`} />
                                            </div>
                                            <p className="text-sm font-bold mt-2 text-blue-300">
                                                {pile.drawn.isReversed && "(R) "}{pile.drawn.id}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* Modal */}
                        {showDrawModal && (
                            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
                                <div className="bg-gray-800 p-8 rounded-2xl w-80 text-center">
                                    <h3 className="text-xl font-bold mb-4">Draw how many?</h3>
                                    <input type="number" min="1" max={piles[activePileIdx].currentStack.length} value={drawCount} 
                                        onChange={e => setDrawCount(Math.max(1, Math.min(parseInt(e.target.value) || 0, piles[activePileIdx].currentStack.length)))}
                                        className="w-full p-2 bg-gray-700 rounded mb-6 text-center text-xl font-bold" />
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowDrawModal(false)} className="flex-1 py-2 bg-gray-600 rounded">Cancel</button>
                                        <button onClick={startReveal} className="flex-1 py-2 bg-blue-600 rounded font-bold">Start</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'REVEAL') {
                const isFinished = revealIdx >= revealSet.length - 1;
                const currentCard = revealIdx >= 0 ? revealSet[revealIdx] : null;

                return (
                    <div className="h-screen flex flex-col items-center justify-center p-8">
                        <header className="mb-12 text-center">
                            <h2 className="text-3xl font-bold text-blue-400 mb-2">Revealing {revealSet.length} cards</h2>
                            <p className="text-gray-500">From {piles[activePileIdx].name}</p>
                        </header>

                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="w-64 h-96 bg-gray-900 rounded-3xl border-4 border-gray-800 shadow-[0_0_50px_rgba(0,0,0,0.5)] flex items-center justify-center mb-8 overflow-hidden relative">
                                {currentCard ? (
                                    <img src={getCardImage(currentCard)} className={`w-full h-full object-cover ${currentCard.isReversed ? 'reversed' : ''}`} alt="Card" />
                                ) : (
                                    <div className="text-gray-700 text-6xl"><i className="fa-solid fa-question"></i></div>
                                )}
                            </div>

                            <div className="flex flex-wrap gap-2 justify-center max-w-lg mb-8">
                                {revealSet.map((c, i) => (
                                    <div key={i} className={`w-3 h-3 rounded-full ${i <= revealIdx ? 'bg-blue-500' : 'bg-gray-700'}`}></div>
                                ))}
                            </div>

                            <div className="flex gap-4">
                                {isFinished ? (
                                    <button onClick={() => setView('PLAY')} className="px-8 py-4 bg-green-600 hover:bg-green-500 rounded-xl font-bold text-xl shadow-lg">Back to Piles</button>
                                ) : (
                                    <button onClick={() => setRevealIdx(revealIdx + 1)} className="px-12 py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-xl shadow-lg animate-pulse">Reveal Next</button>
                                )}
                            </div>
                        </div>

                        {currentCard && (
                            <div className="mt-4 text-2xl font-bold text-white mb-20 animate-fade-in">
                                {currentCard.isReversed && <span className="text-red-400 mr-2">Reversed:</span>}
                                {currentCard.id}
                            </div>
                        )}
                    </div>
                );
            }

            return null;
        };

        ReactDOM.render(<App />, document.getElementById('artifact_react'));
    </script>
</body>
</html>
